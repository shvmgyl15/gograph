baseURL = "https://gograph.identuum.ai/"
languageCode = "en-us"
title = "gograph – Go Codebase Analysis & MCP Server"
theme = "PaperMod"
relativeURLs = false
canonifyURLs = false

enableRobotsTXT = true

[params]
  description = "gograph is a fast, AST-aware Go codebase analysis tool and MCP server. Query call graphs, dependency trees, interface implementers, and error flows from any AI agent or terminal."
  author = "Ozgur Demir"
  defaultTheme = "auto"
  ShowThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  disableAnchoredHeadings = false

  homeInfoParams = { Title = "gograph", Content = "A fast, AST-aware Go codebase analysis tool and MCP server. Query call graphs, dependency trees, interface implementers, and error flows in milliseconds — from your terminal or any AI agent." }

  [params.schema]
    publisherType = "Person"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/ozgurcd/gograph"

[menu]
  [[menu.main]]
    name = "Get Started"
    url = "/docs/getting-started/"
    weight = 1
  [[menu.main]]
    name = "Commands"
    url = "/docs/command-reference/"
    weight = 2
  [[menu.main]]
    name = "AI Integration"
    url = "/docs/agent-integration/"
    weight = 3
  [[menu.main]]
    name = "Workflows"
    url = "/docs/workflows/"
    weight = 4
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 5
  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/ozgurcd/gograph"
